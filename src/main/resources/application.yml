spring:
  application:
    name: evolucaoFisica
  datasource:
    url: jdbc:postgresql://localhost:5432/evolucao_fisica
    username: evolucao_fisica
    password: evolucao_fisica

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

app:
  security:
    jwt:
      issuer: evolucao-fisica
      secret: ${APP_JWT_SECRET:change-me-super-secret-key-with-at-least-32-characters}
      access-token-ttl: PT12H
    google:
      client-id: ${APP_GOOGLE_CLIENT_ID:}
      jwk-set-uri: https://www.googleapis.com/oauth2/v3/certs
      issuer: https://accounts.google.com

server:
  port: 8080
