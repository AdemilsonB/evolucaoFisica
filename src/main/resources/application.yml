spring:
  application:
    name: evolucaoFisica
  datasource:
    url: jdbc:postgresql://localhost:5432/evolucao_fisica
    username: evolucao_fisica
    password: evolucao_fisica

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

server:
  port: 8080
